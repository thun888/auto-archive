name: Build with Nuitka

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: auto-archive-windows
            nuitka_args: "--windows-console-mode=attach"
          - os: ubuntu-latest
            artifact_name: auto-archive-linux
            nuitka_args: ""
          - os: macos-latest
            artifact_name: auto-archive-macos
            nuitka_args: ""

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka

      - name: Build with Nuitka
        run: >
          python -m nuitka
          --standalone
          --output-dir=dist
          --output-filename=auto-archive
          --assume-yes-for-downloads
          ${{ matrix.nuitka_args }}
          auto_archive.py

      - name: Package
        run: |
          cd dist/auto_archive.dist
          7z a -tzip ../../auto-archive-${{ matrix.os }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: auto-archive-${{ matrix.os }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/auto-archive-windows/auto-archive-windows-latest.zip
            artifacts/auto-archive-linux/auto-archive-ubuntu-latest.zip
            artifacts/auto-archive-macos/auto-archive-macos-latest.zip
